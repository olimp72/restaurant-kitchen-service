<div class="container position-sticky z-index-sticky top-0">
  <div class="row">
    <div class="col-12">
      <nav class="navbar navbar-expand-lg blur blur-rounded top-0 z-index-fixed shadow position-absolute my-3 py-2 start-0 end-0 mx-4">
        <div class="container-fluid">
          <a class="navbar-brand font-weight-bolder ms-sm-3 fs-4" href="/">
            🍴 Kitchen Service
          </a>

          <button class="navbar-toggler shadow-none ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navigation" aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon mt-2">
              <span class="navbar-toggler-bar bar1"></span>
              <span class="navbar-toggler-bar bar2"></span>
              <span class="navbar-toggler-bar bar3"></span>
            </span>
          </button>

          <div class="collapse navbar-collapse pt-3 pb-2 py-lg-0" id="navigation">
            <ul class="navbar-nav navbar-nav-hover mx-auto">
              <li class="nav-item">
                <a class="nav-link me-2 fs-5" href="{% url 'kitchen:dish-list' %}">
                  <i class="fas fa-pizza-slice opacity-6 text-dark me-1"></i> Dishes
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link me-2 fs-5" href="{% url 'kitchen:ingredient-list' %}">
                  <i class="fas fa-leaf opacity-6 text-dark me-1"></i> Ingredients
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link me-2 fs-5" href="{% url 'kitchen:dishtype-list' %}">
                  <i class="fas fa-list opacity-6 text-dark me-1"></i> Dish Types
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link me-2 fs-5" href="{% url 'kitchen:cook-list' %}">
                  <i class="fas fa-user-tie opacity-6 text-dark me-1"></i> Cooks
                </a>
              </li>
            </ul>

            <ul class="navbar-nav d-lg-block d-none">
              <li class="nav-item">
                {% if user.is_authenticated %}
                  <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-round mb-0 me-1 bg-gradient-dark text-white px-3 fs-6">
                      Logout ({{ user.username }})
                    </button>
                  </form>
                {% else %}
                  <a href="{% url 'login' %}" class="btn btn-sm btn-round mb-0 me-1 bg-gradient-dark text-white px-4 fs-6">Login</a>
                {% endif %}
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
  </div>
</div>
