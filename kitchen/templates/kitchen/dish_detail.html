{% extends "kitchen/layouts/base.html" %}

{% block content %}
<div class="container" style="padding-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary d-flex justify-content-between align-items-center py-3">
                    <h2 class="mb-0 text-white fs-4">{{ dish.name }}</h2>
                    <span class="badge bg-white text-primary fs-6">${{ dish.price }}</span>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted"><strong>Category:</strong> {{ dish.dish_type.name }}</p>
                    <hr>
                    <h5 class="text-primary mb-3">Ingredients:</h5>
                    <div class="d-flex flex-wrap gap-2 mb-4">
                        {% for ingredient in dish.ingredients.all %}
                            <span class="badge bg-light text-dark border px-3 py-2">{{ ingredient.name }}</span>
                        {% empty %}
                            <span class="text-muted small">No ingredients.</span>
                        {% endfor %}
                    </div>
                </div>
                <div class="card-footer bg-light d-flex justify-content-between p-3 px-4">
                    <a href="{% url 'kitchen:dish-list' %}" class="btn btn-secondary">Back</a>
                    <div>
                        <a href="{% url 'kitchen:dish-update' dish.id %}" class="btn btn-warning">Edit</a>
                        <a href="{% url 'kitchen:dish-delete' dish.id %}" class="btn btn-danger ms-1">Delete</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
