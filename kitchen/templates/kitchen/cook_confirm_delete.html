{% extends "kitchen/layouts/base.html" %}

{% block content %}
<div class="container" style="padding-top: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white text-center py-3">
                    <h4 class="mb-0 text-white">⚠️ Confirm Deletion</h4>
                </div>
                <div class="card-body text-center p-4">
                    <p class="fs-5">Are you sure you want to delete?</p>
                    <p class="fw-bold fs-4">"{{ object.name|default:object.username }}"</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mt-4">
                            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                            <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-light px-4 ms-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
