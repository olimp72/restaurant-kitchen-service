{% extends "kitchen/layouts/base.html" %}

{% block title %}Delete Ingredient{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white text-center">
                    <h4 class="mb-0 text-white">⚠️ Confirm Deletion</h4>
                </div>
                <div class="card-body text-center p-4">
                    <p class="fs-5">Are you sure you want to delete ingredient:</p>
                    <p class="fw-bold fs-4">"{{ object.name }}"</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mt-4">
                            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                            <a href="{% url 'kitchen:ingredient-list' %}" class="btn btn-light px-4 ms-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
